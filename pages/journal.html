<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Journal · Rituals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../auth.css" />
</head>
<body data-page="journal">
  <div class="app-shell">
    <aside class="nav-panel">
      <div class="nav-brand">Rituals</div>
      <nav class="nav-links">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="habits.html">Habits</a>
        <a class="nav-link" href="goals.html">Goals</a>
        <a class="nav-link active" href="journal.html">Journal</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </nav>
      <div class="nav-footer">
        <button type="button" class="btn-secondary" onclick="logout()">Log out</button>
      </div>
    </aside>

    <main class="page-panel">
      <header class="page-header">
        <div>
          <p class="eyebrow">Journal</p>
          <h1>Capture your progress every day.</h1>
          <p class="page-intro">Free-write your daily entry, tag your mood, and reflect on what moved you forward.</p>
        </div>
        <div class="header-actions">
          <a href="dashboard.html" class="btn-secondary">Back to dashboard</a>
        </div>
      </header>

      <section class="form-card journal-card">
        <div class="field">
          <label for="journal-date">Entry date</label>
          <input id="journal-date" type="date" />
        </div>
        <div class="field">
          <label for="journal-mood">Mood</label>
          <select id="journal-mood">
            <option value="">Select mood</option>
            <option value="calm">Calm</option>
            <option value="energized">Energized</option>
            <option value="focused">Focused</option>
            <option value="motivated">Motivated</option>
            <option value="reflective">Reflective</option>
          </select>
        </div>
        <div class="field">
          <label for="journal-entry">Journal entry</label>
          <textarea id="journal-entry" rows="8" placeholder="Write what went well today, what you learned, or what you want to improve."></textarea>
        </div>
        <div class="row-gap">
          <button type="button" class="btn-primary" onclick="saveJournal()">Save entry</button>
          <button type="button" class="btn-secondary" onclick="clearJournal()">Clear</button>
        </div>
      </section>

      <section class="list-panel">
        <div class="section-header">
          <h2>Recent entries</h2>
          <p id="journal-summary">Loading entries...</p>
        </div>
        <div id="journal-list"></div>
      </section>
    </main>
  </div>

  <script src="../supabase-config.js"></script>
  <script src="../supabase.js"></script>
  <script src="../auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
